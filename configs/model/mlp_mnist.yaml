# @package _global_
max_parallel_processes: 10

model:
  _target_: src.models.mlp.create_mlp
  name: mlp_mnist

  input_dim: 784
  hidden_dim: 512
  output_dim: 10
  num_layers: 4
  n_mul: 1.0 # Multiplier for num_fixed values (useful for wider models or varying sparsity)
  norm: layer
  elementwise_affine: true
  activation: gelu

  symmetry: 1  # 0: Standard, 1: W-Asym, 2: Sigma-Asym
  asym_init_only: false  # If true and symmetry in [1, 3], initialize standard model with weights from asym model (only for initialization)
  mask_params:
    default:
      mask_constant: 1.0
      mask_type: random_subsets
      do_normal_mask: true
      num_fixed: 64
    
    linear_mask_params_0:
      mask_constant: 1.0
      num_fixed: 64
    linear_mask_params_1:
      mask_constant: 1.0
      num_fixed: 64
    linear_mask_params_2:
      mask_constant: 0.5
      num_fixed: 64
    linear_mask_params_3:
      mask_constant: 0.25
      num_fixed: 256
