# @package _global_
defaults:
  - model: mlp_mnist
  - dataset: mnist
  - optimizer: adamw
  - scheduler: none
  - training: default
  - interpolation: disabled
  - logging: console
  - _self_

# Multi-model experiment settings (optional)
num_models: 1
use_fixed_masks: false

# Global settings
seed: 42
init_seed: null  # Controls parameter initialization
device: cuda
output_dir: ./outputs
experiment_name: ${now:%Y-%m-%d}/${now:%H-%M-%S}_${model.name}

# Hydra configuration
hydra:
  run:
    dir: ${output_dir}/${experiment_name}

# Override any config here
